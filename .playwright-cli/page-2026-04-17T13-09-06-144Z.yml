                  - generic [ref=e2699]: chunk-09
                  - generic [ref=e2700]: sentences 8-8
                - paragraph [ref=e2701]: We propose a new simple network architecture, the Transformer, based solely on attention mechanisms, dispensing with recurrence and convolutions entirely.
              - article [ref=e2702]:
                - generic [ref=e2703]:
                  - generic [ref=e2704]: chunk-10
                  - generic [ref=e2705]: sentences 9-9
                - paragraph [ref=e2706]: Our model achieves 28.4 BLEU on the WMT 2014 English-to-German translation task, improving over the existing best results, including ensembles, by over 2 BLEU. On the WMT 2014 English-to-French translation task, our model establishes a new single-model state-of-the-art BLEU score of 41.0 after training for 3.5 days on eight GPUs.
              - article [ref=e2707]:
                - generic [ref=e2708]:
                  - generic [ref=e2709]: chunk-11
                  - generic [ref=e2710]: sentences 10-10
                - paragraph [ref=e2711]: The goal of reducing sequential computation also forms the foundation of the Extended Neural GPU, ByteNet and ConvS2S, all of which use convolutional neural networks as basic building block.
              - article [ref=e2712]:
                - generic [ref=e2713]:
                  - generic [ref=e2714]: chunk-12
                  - generic [ref=e2715]: sentences 11-11
                - paragraph [ref=e2716]: Self-attention, sometimes called intra-attention, is an attention mechanism relating different positions of a single sequence in order to compute a representation of the sequence.
              - article [ref=e2717]:
                - generic [ref=e2718]:
                  - generic [ref=e2719]: chunk-13
                  - generic [ref=e2720]: sentences 12-12
                - paragraph [ref=e2721]: "Encoder: The encoder is composed of a stack of N = 6 identical layers. Each layer has two sub-layers. The first is a multi-head self-attention mechanism, and the second is a simple, position-wise fully connected feed-forward network. We employ a residual connection around each of the two sub-layers, followed by layer normalization."
              - article [ref=e2722]:
                - generic [ref=e2723]:
                  - generic [ref=e2724]: chunk-14
                  - generic [ref=e2725]: sentences 13-13
                - paragraph [ref=e2726]: We call our particular attention Scaled Dot-Product Attention. The input consists of queries and keys of dimension dk, and values of dimension dv.
              - article [ref=e2727]:
                - generic [ref=e2728]:
                  - generic [ref=e2729]: chunk-15
                  - generic [ref=e2730]: sentences 14-14
                - paragraph [ref=e2731]: Multi-head attention allows the model to jointly attend to information from different representation subspaces at different positions.
              - article [ref=e2732]:
                - generic [ref=e2733]:
                  - generic [ref=e2734]: chunk-16
                  - generic [ref=e2735]: sentences 15-15
                - paragraph [ref=e2736]: Since our model contains no recurrence and no convolution, in order for the model to make use of the order of the sequence, we must inject some information about the relative or absolute position of the tokens in the sequence. To this end, we add positional encodings to the input embeddings at the bottoms of the encoder and decoder stacks.
              - article [ref=e2737]:
                - generic [ref=e2738]:
                  - generic [ref=e2739]: chunk-17
                  - generic [ref=e2740]: sentences 16-16
                - paragraph [ref=e2741]: We trained on the standard WMT 2014 English-German dataset consisting of about 4.5 million sentence pairs. Sentences were encoded using byte-pair encoding, which has a shared source-target vocabulary of about 37000 tokens. For English-French, we used the significantly larger WMT 2014 English-French dataset consisting of 36M sentences and split tokens into a 32000 word-piece vocabulary.
              - article [ref=e2742]:
                - generic [ref=e2743]:
                  - generic [ref=e2744]: chunk-18
                  - generic [ref=e2745]: sentences 17-17
                - paragraph [ref=e2746]: We used the Adam optimizer with beta1 = 0.9, beta2 = 0.98 and epsilon = 10^-9.
              - article [ref=e2747]:
                - generic [ref=e2748]:
                  - generic [ref=e2749]: chunk-19
                  - generic [ref=e2750]: sentences 18-18
                - paragraph [ref=e2751]: During training, we employed label smoothing of value epsilon_ls = 0.1. This hurts perplexity, as the model learns to be more unsure, but improves accuracy and BLEU score.
              - article [ref=e2752]:
                - generic [ref=e2753]:
                  - generic [ref=e2754]: chunk-20
                  - generic [ref=e2755]: sentences 19-19
                - paragraph [ref=e2756]: On the WMT 2014 English-to-German translation task, the big transformer model (Transformer (big)) outperforms the best previously reported models by more than 2.0 BLEU, establishing a new state-of-the-art BLEU score of 28.4. Training took 3.5 days on 8 P100 GPUs.
              - article [ref=e2757]:
                - generic [ref=e2758]:
                  - generic [ref=e2759]: chunk-21
                  - generic [ref=e2760]: sentences 20-20
                - paragraph [ref=e2761]: On the WMT 2014 English-to-French translation task, our big model achieves a BLEU score of 41.0, outperforming all of the previously published single models, at less than one quarter the training cost of the previous state-of-the-art model.
              - article [ref=e2762]:
                - generic [ref=e2763]:
                  - generic [ref=e2764]: chunk-22
                  - generic [ref=e2765]: sentences 21-21
                - paragraph [ref=e2766]: In this work, we presented the Transformer, the first sequence transduction model based entirely on attention, replacing the recurrent layers most commonly used in encoder-decoder architectures with multi-headed self-attention.
